name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.2.5
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How do we reproduce this?
      placeholder: |
        1. Run `npx @sgaluza/api-to-mcp rest ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config / command used
      description: Paste the command or config file (redact any secrets)
      render: bash

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.0
