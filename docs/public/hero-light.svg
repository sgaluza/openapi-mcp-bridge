<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.15"/>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.12; r: 52; }
      50%       { opacity: 0.22; r: 62; }
    }
    @keyframes pulse2 {
      0%, 100% { opacity: 0.06; r: 70; }
      50%       { opacity: 0.14; r: 82; }
    }
    .pulse-ring  { animation: pulse  2.4s ease-in-out infinite; }
    .pulse-ring2 { animation: pulse2 2.4s ease-in-out infinite 0.4s; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .spin-slow {
      transform-origin: 360px 240px;
      animation: spin 8s linear infinite;
    }

    .dot-l1 {
      offset-path: path('M 210 240 L 305 240');
      animation: flowL 1.8s ease-in-out infinite 0s;
    }
    .dot-l2 {
      offset-path: path('M 210 240 L 305 240');
      animation: flowL 1.8s ease-in-out infinite 0.6s;
    }
    .dot-l3 {
      offset-path: path('M 210 240 L 305 240');
      animation: flowL 1.8s ease-in-out infinite 1.2s;
    }
    .dot-r1 {
      offset-path: path('M 415 240 L 510 240');
      animation: flowR 1.8s ease-in-out infinite 0.3s;
    }
    .dot-r2 {
      offset-path: path('M 415 240 L 510 240');
      animation: flowR 1.8s ease-in-out infinite 0.9s;
    }
    .dot-r3 {
      offset-path: path('M 415 240 L 510 240');
      animation: flowR 1.8s ease-in-out infinite 1.5s;
    }

    @keyframes flowL {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes flowR {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }

    @keyframes fadeIn {
      0%   { opacity: 0; transform: translateX(8px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .tool-1 { animation: fadeIn 0.5s ease-out 0.2s both; }
    .tool-2 { animation: fadeIn 0.5s ease-out 0.5s both; }
    .tool-3 { animation: fadeIn 0.5s ease-out 0.8s both; }
    .tool-4 { animation: fadeIn 0.5s ease-out 1.1s both; }
    .tool-5 { animation: fadeIn 0.5s ease-out 1.4s both; }
  </style>

  <!-- Background -->
  <rect width="720" height="480" fill="url(#bgGrad)" rx="20"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="80" x2="720" y2="80"/><line x1="0" y1="160" x2="720" y2="160"/>
    <line x1="0" y1="240" x2="720" y2="240"/><line x1="0" y1="320" x2="720" y2="320"/>
    <line x1="0" y1="400" x2="720" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="480"/><line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="360" y1="0" x2="360" y2="480"/><line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="600" y1="0" x2="600" y2="480"/>
  </g>

  <!-- ── LEFT BLOCK ── -->
  <rect x="30" y="80" width="180" height="320" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="80" width="180" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="30" y="106" width="180" height="14" fill="#f8fafc"/>
  <circle cx="52" cy="100" r="6" fill="#ff5f57"/><circle cx="70" cy="100" r="6" fill="#febc2e"/><circle cx="88" cy="100" r="6" fill="#28c840"/>
  <text x="105" y="105" font-family="'SF Mono',monospace" font-size="11" fill="#94a3b8">openapi.yaml</text>

  <text x="46" y="144" font-family="'SF Mono',monospace" font-size="11" fill="#6366f1">paths:</text>
  <text x="58" y="162" font-family="'SF Mono',monospace" font-size="11" fill="#334155">/users:</text>
  <text x="70" y="179" font-family="'SF Mono',monospace" font-size="11" fill="#16a34a">get:</text>
  <text x="82" y="196" font-family="'SF Mono',monospace" font-size="10" fill="#94a3b8">operationId:</text>
  <text x="82" y="212" font-family="'SF Mono',monospace" font-size="11" fill="#ea580c">  listUsers</text>
  <text x="70" y="230" font-family="'SF Mono',monospace" font-size="11" fill="#dc2626">post:</text>
  <text x="82" y="247" font-family="'SF Mono',monospace" font-size="10" fill="#94a3b8">operationId:</text>
  <text x="82" y="263" font-family="'SF Mono',monospace" font-size="11" fill="#ea580c">  createUser</text>
  <text x="58" y="281" font-family="'SF Mono',monospace" font-size="11" fill="#334155">/issues:</text>
  <text x="70" y="298" font-family="'SF Mono',monospace" font-size="11" fill="#16a34a">get:</text>
  <text x="82" y="315" font-family="'SF Mono',monospace" font-size="11" fill="#ea580c">  listIssues</text>
  <text x="70" y="332" font-family="'SF Mono',monospace" font-size="11" fill="#dc2626">post:</text>
  <text x="82" y="349" font-family="'SF Mono',monospace" font-size="11" fill="#ea580c">  createIssue</text>
  <text x="58" y="367" font-family="'SF Mono',monospace" font-size="11" fill="#cbd5e1">...</text>

  <rect x="62" y="386" width="116" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="120" y="400" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="middle" font-weight="500">OpenAPI / GraphQL</text>

  <!-- ── CENTER BRIDGE ── -->
  <circle class="pulse-ring2" cx="360" cy="240" r="70" fill="#6366f1" opacity="0.06"/>
  <circle class="pulse-ring"  cx="360" cy="240" r="52" fill="#6366f1" opacity="0.10"/>
  <circle cx="360" cy="240" r="46" fill="white" stroke="#6366f1" stroke-width="2.5" filter="url(#shadow)"/>
  <circle class="spin-slow" cx="360" cy="240" r="38" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="6 4" opacity="0.3"/>
  <text x="360" y="252" font-family="monospace" font-size="28" fill="url(#brandGrad)" text-anchor="middle" filter="url(#glow)">⇄</text>

  <rect x="310" y="300" width="100" height="24" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="316" font-family="sans-serif" font-size="10.5" fill="#64748b" text-anchor="middle" font-weight="600">api-to-mcp</text>

  <!-- Lines -->
  <line x1="210" y1="240" x2="312" y2="240" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>
  <polygon points="312,234 322,240 312,246" fill="#6366f1" opacity="0.8" filter="url(#glow)"/>
  <line x1="398" y1="240" x2="508" y2="240" stroke="#10b981" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>
  <polygon points="508,234 518,240 508,246" fill="#10b981" opacity="0.8" filter="url(#glowGreen)"/>

  <!-- Flow dots -->
  <circle class="dot-l1" r="5" fill="#818cf8" filter="url(#glow)"/>
  <circle class="dot-l2" r="5" fill="#818cf8" filter="url(#glow)"/>
  <circle class="dot-l3" r="5" fill="#818cf8" filter="url(#glow)"/>
  <circle class="dot-r1" r="5" fill="#10b981" filter="url(#glowGreen)"/>
  <circle class="dot-r2" r="5" fill="#10b981" filter="url(#glowGreen)"/>
  <circle class="dot-r3" r="5" fill="#10b981" filter="url(#glowGreen)"/>

  <!-- ── RIGHT BLOCK ── -->
  <rect x="510" y="80" width="180" height="320" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="510" y="80" width="180" height="40" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="510" y="106" width="180" height="14" fill="#f8fafc"/>
  <circle cx="532" cy="100" r="6" fill="#ff5f57"/><circle cx="550" cy="100" r="6" fill="#febc2e"/><circle cx="568" cy="100" r="6" fill="#28c840"/>
  <text x="585" y="105" font-family="'SF Mono',monospace" font-size="11" fill="#94a3b8">MCP tools</text>

  <g class="tool-1">
    <rect x="526" y="130" width="148" height="34" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
    <circle cx="544" cy="147" r="7" fill="#10b981" opacity="0.9"/>
    <text x="558" y="152" font-family="'SF Mono',monospace" font-size="11.5" fill="#134e4a">listUsers</text>
  </g>
  <g class="tool-2">
    <rect x="526" y="173" width="148" height="34" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.2"/>
    <circle cx="544" cy="190" r="7" fill="#f59e0b" opacity="0.9"/>
    <text x="558" y="195" font-family="'SF Mono',monospace" font-size="11.5" fill="#78350f">createUser</text>
  </g>
  <g class="tool-3">
    <rect x="526" y="216" width="148" height="34" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
    <circle cx="544" cy="233" r="7" fill="#10b981" opacity="0.9"/>
    <text x="558" y="238" font-family="'SF Mono',monospace" font-size="11.5" fill="#134e4a">listIssues</text>
  </g>
  <g class="tool-4">
    <rect x="526" y="259" width="148" height="34" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.2"/>
    <circle cx="544" cy="276" r="7" fill="#f59e0b" opacity="0.9"/>
    <text x="558" y="281" font-family="'SF Mono',monospace" font-size="11.5" fill="#78350f">createIssue</text>
  </g>
  <g class="tool-5">
    <rect x="526" y="302" width="148" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
    <circle cx="544" cy="319" r="7" fill="#6366f1" opacity="0.9"/>
    <text x="558" y="324" font-family="'SF Mono',monospace" font-size="11.5" fill="#312e81">getProject</text>
  </g>

  <rect x="526" y="345" width="148" height="22" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="600" y="360" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">+ more tools…</text>

  <rect x="542" y="386" width="116" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="600" y="400" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="middle" font-weight="500">Claude · Cursor · any MCP</text>

  <text x="360" y="456" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
    OpenAPI · GraphQL  →  stdio bridge  →  MCP tools
  </text>
</svg>
