<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b27"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* Bridge pulse */
    @keyframes pulse {
      0%, 100% { opacity: 0.15; r: 52; }
      50%       { opacity: 0.30; r: 62; }
    }
    @keyframes pulse2 {
      0%, 100% { opacity: 0.08; r: 70; }
      50%       { opacity: 0.18; r: 82; }
    }
    .pulse-ring  { animation: pulse  2.4s ease-in-out infinite; }
    .pulse-ring2 { animation: pulse2 2.4s ease-in-out infinite 0.4s; }

    /* Bridge icon rotate */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .spin-slow {
      transform-origin: 360px 240px;
      animation: spin 8s linear infinite;
    }

    /* Flowing dots — left side (purple) */
    @keyframes flowL1 {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes flowL2 {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes flowL3 {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }

    /* Flowing dots — right side (green) */
    @keyframes flowR1 {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes flowR2 {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes flowR3 {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }

    .dot-l1 {
      offset-path: path('M 210 240 L 305 240');
      animation: flowL1 1.8s ease-in-out infinite 0s;
    }
    .dot-l2 {
      offset-path: path('M 210 240 L 305 240');
      animation: flowL2 1.8s ease-in-out infinite 0.6s;
    }
    .dot-l3 {
      offset-path: path('M 210 240 L 305 240');
      animation: flowL3 1.8s ease-in-out infinite 1.2s;
    }
    .dot-r1 {
      offset-path: path('M 415 240 L 510 240');
      animation: flowR1 1.8s ease-in-out infinite 0.3s;
    }
    .dot-r2 {
      offset-path: path('M 415 240 L 510 240');
      animation: flowR2 1.8s ease-in-out infinite 0.9s;
    }
    .dot-r3 {
      offset-path: path('M 415 240 L 510 240');
      animation: flowR3 1.8s ease-in-out infinite 1.5s;
    }

    /* Tool rows highlight on appearance */
    @keyframes fadeIn {
      0%   { opacity: 0; transform: translateX(8px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .tool-1 { animation: fadeIn 0.5s ease-out 0.2s both; }
    .tool-2 { animation: fadeIn 0.5s ease-out 0.5s both; }
    .tool-3 { animation: fadeIn 0.5s ease-out 0.8s both; }
    .tool-4 { animation: fadeIn 0.5s ease-out 1.1s both; }
    .tool-5 { animation: fadeIn 0.5s ease-out 1.4s both; }
  </style>

  <!-- Background -->
  <rect width="720" height="480" fill="url(#bgGrad)" rx="20"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="80" x2="720" y2="80"/><line x1="0" y1="160" x2="720" y2="160"/>
    <line x1="0" y1="240" x2="720" y2="240"/><line x1="0" y1="320" x2="720" y2="320"/>
    <line x1="0" y1="400" x2="720" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="480"/><line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="360" y1="0" x2="360" y2="480"/><line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="600" y1="0" x2="600" y2="480"/>
  </g>

  <!-- ═══════════════════════════════════════════
       LEFT BLOCK: OpenAPI spec
  ═══════════════════════════════════════════ -->
  <rect x="30" y="80" width="180" height="320" rx="14" fill="#0d1117" stroke="#21262d" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="30" y="80" width="180" height="40" rx="14" fill="#161b22"/>
  <rect x="30" y="106" width="180" height="14" fill="#161b22"/>
  <circle cx="52" cy="100" r="6" fill="#ff5f57"/><circle cx="70" cy="100" r="6" fill="#febc2e"/><circle cx="88" cy="100" r="6" fill="#28c840"/>
  <text x="105" y="105" font-family="'SF Mono',monospace" font-size="11" fill="#484f58">openapi.yaml</text>

  <!-- YAML content -->
  <text x="46" y="144" font-family="'SF Mono',monospace" font-size="11" fill="#79c0ff">paths:</text>
  <text x="58" y="162" font-family="'SF Mono',monospace" font-size="11" fill="#e6edf3">/users:</text>
  <text x="70" y="179" font-family="'SF Mono',monospace" font-size="11" fill="#56d364">get:</text>
  <text x="82" y="196" font-family="'SF Mono',monospace" font-size="10" fill="#6e7681">operationId:</text>
  <text x="82" y="212" font-family="'SF Mono',monospace" font-size="11" fill="#ffa657">  listUsers</text>
  <text x="70" y="230" font-family="'SF Mono',monospace" font-size="11" fill="#f78166">post:</text>
  <text x="82" y="247" font-family="'SF Mono',monospace" font-size="10" fill="#6e7681">operationId:</text>
  <text x="82" y="263" font-family="'SF Mono',monospace" font-size="11" fill="#ffa657">  createUser</text>
  <text x="58" y="281" font-family="'SF Mono',monospace" font-size="11" fill="#e6edf3">/issues:</text>
  <text x="70" y="298" font-family="'SF Mono',monospace" font-size="11" fill="#56d364">get:</text>
  <text x="82" y="315" font-family="'SF Mono',monospace" font-size="11" fill="#ffa657">  listIssues</text>
  <text x="70" y="332" font-family="'SF Mono',monospace" font-size="11" fill="#f78166">post:</text>
  <text x="82" y="349" font-family="'SF Mono',monospace" font-size="11" fill="#ffa657">  createIssue</text>
  <text x="58" y="367" font-family="'SF Mono',monospace" font-size="11" fill="#6e7681">...</text>

  <!-- LEFT label -->
  <rect x="62" y="386" width="116" height="20" rx="5" fill="#161b22" stroke="#21262d"/>
  <text x="120" y="400" font-family="sans-serif" font-size="10" fill="#8b949e" text-anchor="middle" font-weight="500">OpenAPI / GraphQL</text>

  <!-- ═══════════════════════════════════════════
       CENTER: Bridge
  ═══════════════════════════════════════════ -->

  <!-- Glow halos -->
  <circle class="pulse-ring2" cx="360" cy="240" r="70" fill="#6366f1" opacity="0.08"/>
  <circle class="pulse-ring"  cx="360" cy="240" r="52" fill="#6366f1" opacity="0.15"/>

  <!-- Bridge ring -->
  <circle cx="360" cy="240" r="46" fill="#0d1117" stroke="#6366f1" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Spinning dashed ring -->
  <circle class="spin-slow" cx="360" cy="240" r="38" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>

  <!-- Bridge icon -->
  <text x="360" y="252" font-family="monospace" font-size="28" fill="url(#brandGrad)" text-anchor="middle" filter="url(#glow)">⇄</text>

  <!-- Bridge label -->
  <rect x="310" y="300" width="100" height="24" rx="7" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="360" y="316" font-family="sans-serif" font-size="10.5" fill="#8b949e" text-anchor="middle" font-weight="600">api-to-mcp</text>

  <!-- ═══════════════════════════════════════════
       CONNECTION LINES
  ═══════════════════════════════════════════ -->

  <!-- Left line -->
  <line x1="210" y1="240" x2="312" y2="240" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <!-- Left arrowhead -->
  <polygon points="312,234 322,240 312,246" fill="#6366f1" opacity="0.9" filter="url(#glow)"/>

  <!-- Right line -->
  <line x1="398" y1="240" x2="508" y2="240" stroke="#10b981" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <!-- Right arrowhead -->
  <polygon points="508,234 518,240 508,246" fill="#10b981" opacity="0.9" filter="url(#glowGreen)"/>

  <!-- ═══════════════════════════════════════════
       ANIMATED FLOW DOTS
  ═══════════════════════════════════════════ -->
  <!-- Left dots (purple) -->
  <circle class="dot-l1" r="5" fill="#818cf8" filter="url(#glow)"/>
  <circle class="dot-l2" r="5" fill="#818cf8" filter="url(#glow)"/>
  <circle class="dot-l3" r="5" fill="#818cf8" filter="url(#glow)"/>

  <!-- Right dots (green) -->
  <circle class="dot-r1" r="5" fill="#34d399" filter="url(#glowGreen)"/>
  <circle class="dot-r2" r="5" fill="#34d399" filter="url(#glowGreen)"/>
  <circle class="dot-r3" r="5" fill="#34d399" filter="url(#glowGreen)"/>

  <!-- ═══════════════════════════════════════════
       RIGHT BLOCK: MCP Tools
  ═══════════════════════════════════════════ -->
  <rect x="510" y="80" width="180" height="320" rx="14" fill="#0d1117" stroke="#21262d" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="510" y="80" width="180" height="40" rx="14" fill="#161b22"/>
  <rect x="510" y="106" width="180" height="14" fill="#161b22"/>
  <circle cx="532" cy="100" r="6" fill="#ff5f57"/><circle cx="550" cy="100" r="6" fill="#febc2e"/><circle cx="568" cy="100" r="6" fill="#28c840"/>
  <text x="585" y="105" font-family="'SF Mono',monospace" font-size="11" fill="#484f58">MCP tools</text>

  <!-- Tool rows -->
  <g class="tool-1">
    <rect x="526" y="130" width="148" height="34" rx="8" fill="#0d2137" stroke="#1f4068" stroke-width="1.2"/>
    <circle cx="544" cy="147" r="7" fill="#10b981" opacity="0.9" filter="url(#glowGreen)"/>
    <text x="558" y="152" font-family="'SF Mono',monospace" font-size="11.5" fill="#e6edf3">listUsers</text>
  </g>
  <g class="tool-2">
    <rect x="526" y="173" width="148" height="34" rx="8" fill="#1a1500" stroke="#3d3000" stroke-width="1.2"/>
    <circle cx="544" cy="190" r="7" fill="#f59e0b" opacity="0.9"/>
    <text x="558" y="195" font-family="'SF Mono',monospace" font-size="11.5" fill="#e6edf3">createUser</text>
  </g>
  <g class="tool-3">
    <rect x="526" y="216" width="148" height="34" rx="8" fill="#0d2137" stroke="#1f4068" stroke-width="1.2"/>
    <circle cx="544" cy="233" r="7" fill="#10b981" opacity="0.9" filter="url(#glowGreen)"/>
    <text x="558" y="238" font-family="'SF Mono',monospace" font-size="11.5" fill="#e6edf3">listIssues</text>
  </g>
  <g class="tool-4">
    <rect x="526" y="259" width="148" height="34" rx="8" fill="#1a1500" stroke="#3d3000" stroke-width="1.2"/>
    <circle cx="544" cy="276" r="7" fill="#f59e0b" opacity="0.9"/>
    <text x="558" y="281" font-family="'SF Mono',monospace" font-size="11.5" fill="#e6edf3">createIssue</text>
  </g>
  <g class="tool-5">
    <rect x="526" y="302" width="148" height="34" rx="8" fill="#130d28" stroke="#2d1f5e" stroke-width="1.2"/>
    <circle cx="544" cy="319" r="7" fill="#818cf8" opacity="0.9" filter="url(#glow)"/>
    <text x="558" y="324" font-family="'SF Mono',monospace" font-size="11.5" fill="#e6edf3">getProject</text>
  </g>

  <!-- More indicator -->
  <rect x="526" y="345" width="148" height="22" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="360" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="middle">+ more tools…</text>

  <!-- RIGHT label -->
  <rect x="542" y="386" width="116" height="20" rx="5" fill="#161b22" stroke="#21262d"/>
  <text x="600" y="400" font-family="sans-serif" font-size="10" fill="#8b949e" text-anchor="middle" font-weight="500">Claude · Cursor · any MCP</text>

  <!-- Bottom tagline -->
  <text x="360" y="456" font-family="sans-serif" font-size="11" fill="#484f58" text-anchor="middle">
    OpenAPI · GraphQL  →  stdio bridge  →  MCP tools
  </text>
</svg>
